<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detailed view for Fallout 76 C.A.M.P. Item">
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="shortcut icon" type="image/png" href="../assets/CAMPIcon2-32x32.png">
  <title>C.A.M.P. Item Details</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .detail-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    /* ── Back button ── */
    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding: 8px 16px;
      background-color: var(--accent);
      color: black;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }
    .back-button:hover { background-color: var(--accent-dim); }
    .back-arrow {
      display: inline-block;
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 10px solid black;
      flex-shrink: 0;
    }

    /* ── Unified card ── */
    .item-card {
      border: 2px solid var(--accent);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg);
      display: grid;
      grid-template-columns: 214px 1fr;
      grid-template-rows: auto auto;
      margin-bottom: 0;
    }

    /* ── Infobox (left column, row 1 only) ── */
    .infobox {
      grid-column: 1;
      grid-row: 1;
      border-right: 2px solid var(--accent);
      background: var(--card-bg);
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    .infobox-image {
      background: #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      border-bottom: 2px solid var(--accent);
      min-height: 130px;
    }
    .infobox-image img {
      max-width: 210px;
      max-height: 210px;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .infobox-rows { display: flex; flex-direction: column; flex: 1; }
    .infobox-row { display: flex; align-items: stretch; border-bottom: 1px solid #383838; flex: 1; }
    .infobox-row:last-child { border-bottom: none; }
    .infobox-budget {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 12px;
      border-bottom: 2px solid var(--accent);
      background: #1e1e1e;
      text-align: center;
    }
    .infobox-budget-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 15px;
      color: var(--text);
      font-weight: 600;
      width: 100%;
    }
    .infobox-budget-main img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
    .infobox-budget-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .infobox-budget-tier {
      font-size: 10px;
      color: var(--text-muted);
      font-style: italic;
    }

    .infobox-label {
      font-weight: 700;
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 8px 9px;
      width: 70px;
      flex-shrink: 0;
      border-right: 1px solid #383838;
      background: #232323;
      display: flex;
      align-items: center;
      align-self: stretch;
      line-height: 1.2;
    }

    .infobox-value {
      padding: 8px 10px;
      color: var(--text);
      flex: 1;
      word-break: break-all;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    /* ── Right column: content blocks ── */
    .right-panel {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      flex-direction: column;
    }
    .right-panel-title {
      padding: 16px 18px 14px;
      text-align: center;
      color: var(--accent);
      font-size: 30px;
      font-weight: 700;
      line-height: 1.1;
      margin: 0;
      border-bottom: 1px solid #383838;
    }
    .right-panel-block {
      padding: 14px 18px;
    }
    .right-panel-block + .right-panel-block {
      border-top: 1px solid #383838;
    }
    .right-panel-block h2 {
      margin: 0 0 10px 0;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .entm-description-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .entm-description {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.75;
      white-space: pre-wrap;
      text-align: center;
    }

    /* ── Storefront row (full width, row 2) ── */
    .storefront-row {
      grid-column: 1 / 3;
      grid-row: 2;
      border-top: 2px solid var(--accent);
      padding: 14px 18px;
    }
    .storefront-row h2 {
      margin: 0 0 12px 0;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: left;
    }

    .infobox-value-col {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .infobox-value-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .infobox-value .budget-icon {
      width: 20px;
      height: 20px;
      object-fit: contain;
      flex-shrink: 0;
    }

    /* ── Title ── */
    .item-title {
      margin: 0 0 14px 0;
      color: var(--accent);
      font-size: 34px;
      line-height: 1.1;
      font-weight: 700;
    }

    .detail-inline-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .detail-pill {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 14px;
      color: var(--accent);
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      line-height: 1.3;
      word-break: break-word;
      max-width: 420px;
    }
    .detail-pill-main {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-pill img {
      width: auto;
      height: 34px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .detail-pill-flavor {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
      padding-left: 2px;
      line-height: 1.3;
    }

    .detail-connector {
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }

    .detail-arrow {
      display: inline-block;
      width: 0; height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-left: 11px solid var(--accent);
      flex-shrink: 0;
    }

    .placement-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .clearfix::after { content: ''; display: table; clear: both; }

    .error-message {
      padding: 16px;
      background: #8b2c2c;
      color: #ff6b6b;
      border-radius: 6px;
      border: 2px solid #ff6b6b;
      margin: 16px 0;
    }

    /* ── Max Build Count ── */
    .max-build-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .max-build-stat {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      color: var(--text);
    }
    .max-build-stat img {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }
    .max-build-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .max-build-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    /* ── Shares max build count with ── */
    .shared-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .shared-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .shared-item {
      width: 80px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      transition: border-color 0.15s;
    }
    .shared-item:hover { border-color: var(--accent); }
    .shared-item img {
      width: 52px;
      height: 52px;
      object-fit: contain;
    }
    .shared-item-name {
      font-size: 9px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .shared-view-more {
      width: 80px;
      height: 80px;
      background: #1a1a1a;
      border: 1px dashed #666;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 6px;
      transition: border-color 0.15s, color 0.15s;
    }
    .shared-view-more:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Shared items modal ── */
    .shared-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: lbFadeIn 0.15s ease;
      overflow: hidden;
    }
    .shared-modal-wrap {
      position: relative;
      max-width: 560px;
      width: 90vw;
      cursor: default;
    }
    .shared-modal {
      background: #1e1e1e;
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
      overflow-x: hidden;
      box-sizing: border-box;
    }
    .shared-modal h3 {
      color: var(--accent);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 14px 0;
    }
    .shared-modal-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .shared-none {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #555;
      font-size: 13px;
    }
    .shared-modal .shared-grid { flex-wrap: wrap; }
    /* ── Prev / Next nav ── */
    .item-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .item-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background-color: #5a4a00;
      color: #8a7a40;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      pointer-events: none;
      user-select: none;
      transition: background-color 0.2s ease;
    }
    .item-nav-btn.active {
      background-color: var(--accent);
      color: black;
      pointer-events: auto;
      cursor: pointer;
    }
    .item-nav-btn.active:hover { background-color: var(--accent-dim); }
    .nav-arrow-left {
      display: inline-block;
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-right: 10px solid currentColor;
      flex-shrink: 0;
    }
    .nav-arrow-right {
      display: inline-block;
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-bottom: 6px solid transparent;
      border-left: 10px solid currentColor;
      flex-shrink: 0;
    }

    /* ── Image fade-in on load ── */
    img.lazy-fade {
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    img.lazy-fade.loaded {
      opacity: 1;
    }

    .storefront-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .storefront-thumb {
      cursor: pointer;
      border: 2px solid #444;
      border-radius: 6px;
      overflow: hidden;
      background: #1a1a1a;
      transition: border-color 0.15s, transform 0.15s;
    }
    .storefront-thumb:hover {
      border-color: var(--accent);
      transform: scale(1.03);
    }
    .storefront-thumb img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      padding: 10px;
      box-sizing: border-box;
    }

    /* ── Lightbox ── */
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: lbFadeIn 0.15s ease;
    }
    @keyframes lbFadeIn { from { opacity:0; } to { opacity:1; } }

    .lightbox-inner {
      position: relative;
      cursor: default;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }
    .lightbox-inner img {
      max-width: calc(90vw - 32px);
      max-height: calc(85vh - 32px);
      object-fit: contain;
      display: block;
    }
    .lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 50%;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 600px) {
      .item-card { grid-template-columns: 1fr; }
      .infobox { grid-column: 1; grid-row: 1; border-right: none; border-bottom: 2px solid var(--accent); }
      .right-panel { grid-column: 1; grid-row: 2; }
      .storefront-row { grid-column: 1; grid-row: 3; }
      .right-panel-title { font-size: 22px; }
      .detail-pill { max-width: 100%; }
      .storefront-thumb img { width: 45vw; height: 45vw; max-width: 200px; max-height: 200px; }
    }
  </style>
</head>

    function normalizeTag(tag) {
      for (const [key, data] of Object.entries(multiVendorCategories)) {
        if (key === tag || (data.prefixes && data.prefixes.some(p => tag.startsWith(p)))) return key;
      }
      return tag;
    }

    function getBookIconSrc(nt, bookEditorId, bookSource) {
      if (/Challenge_/.test(bookEditorId)) return '../assets/ChallengeIcon.svg';
      if (String(bookSource||'').toLowerCase() === 'learnbypickup') return '../assets/LearnOnPickupIcon.webp';
      if (multiVendorCategories[nt]?.icon) return multiVendorCategories[nt].icon;
      return BookTagIcons[nt] || '';
    }

    function getBookTooltip(nt, origTags, bookEditorId, bookSource) {
      if (/Challenge_/.test(bookEditorId)) return 'Complete a Challenge to Unlock';
      if (String(bookSource||'').toLowerCase() === 'learnbypickup') return 'Loot to Unlock';
      if (nt === 'None') return '';
      // Normalize BullionVendor variants
      const key = nt.startsWith('BullionVendor') ? 'BullionVendor' : nt;
      if (key in multiVendorCategories) {
        const cat = multiVendorCategories[key];
        const vendors = origTags.filter(t => t===key||(cat.prefixes&&cat.prefixes.some(p=>t.startsWith(p)))).map(t=>{
          if(t===key) return key==='BullionVendor'?'Gold Bullion':key.replace('Vendor','');
          const m=cat.prefixes.find(p=>t.startsWith(p));
          return m?m.replace(key,'').replace('Vendor','').replace(/([a-z])([A-Z])/g,'$1 $2').trim():t;
        });
        if(key==='NPCVendor') return `Sold by NPC Vendor (${vendors.join(', ')})`;
        const label=key==='BullionVendor'?'Gold Bullion':key.replace('Vendor','');
        return `Sold by ${label} Vendor (${vendors.join(', ')})`;
      }
      return IconAltText_BOOK[key]?.alt || (key === 'None' ? '' : key);
    }

    // iconSrcs: string | string[]
    // flavorLines: string | string[]  — each rendered as its own line/bullet
    function makePill(text, iconSrcs, flavorLines) {
      const pill = document.createElement('span');
      pill.className = 'detail-pill';

      const icons   = iconSrcs   ? (Array.isArray(iconSrcs)   ? iconSrcs   : [iconSrcs])   : [];
      const flavors = flavorLines ? (Array.isArray(flavorLines) ? flavorLines : [flavorLines]) : [];

      // Main row: all icons + label text
      const main = document.createElement('span');
      main.className = 'detail-pill-main';
      icons.filter(Boolean).forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        main.appendChild(img);
      });
      main.appendChild(document.createTextNode(text));
      pill.appendChild(main);

      // Flavor lines — deduplicated, skip if same as pill text
      const uniqueFlavors = [...new Set(flavors.filter(f => f && f !== text))];
      if (uniqueFlavors.length === 1) {
        const flavor = document.createElement('span');
        flavor.className = 'detail-pill-flavor';
        flavor.textContent = uniqueFlavors[0];
        pill.appendChild(flavor);
      } else {
        uniqueFlavors.forEach(line => {
          const flavor = document.createElement('span');
          flavor.className = 'detail-pill-flavor';
          flavor.textContent = '• ' + line;
          pill.appendChild(flavor);
        });
      }

      return pill;
    }

    // ── Navigation history (prev/next within item-view) ──
    const NAV_KEY = 'itemViewHistory';
    let navHistory = JSON.parse(sessionStorage.getItem(NAV_KEY) || '[]');
    let navIndex   = parseInt(sessionStorage.getItem(NAV_KEY + '_idx') || '-1', 10);

    function updateNavButtons(formId) {
      const prev = document.getElementById('navPrev');
      const next = document.getElementById('navNext');
      if (navIndex > 0) {
        prev.classList.add('active');
        prev.href = `item-view.html?id=${encodeURIComponent(navHistory[navIndex - 1])}`;
        prev.onclick = e => { e.preventDefault(); navIndex--; sessionStorage.setItem(NAV_KEY + '_idx', navIndex); window.location.href = prev.href; };
      } else {
        prev.classList.remove('active');
        prev.removeAttribute('href');
      }
      if (navIndex < navHistory.length - 1) {
        next.classList.add('active');
        next.href = `item-view.html?id=${encodeURIComponent(navHistory[navIndex + 1])}`;
        next.onclick = e => { e.preventDefault(); navIndex++; sessionStorage.setItem(NAV_KEY + '_idx', navIndex); window.location.href = next.href; };
      } else {
        next.classList.remove('active');
        next.removeAttribute('href');
      }
    }

    // ── Load ──
    const urlParams = new URLSearchParams(window.location.search);
    const formId = urlParams.get('id');
    const contentDiv = document.getElementById('content');

    if (!formId) {
      contentDiv.innerHTML = '<div class="error-message">Error: No item ID provided.</div>';
    } else {
      // Update history: if navigating via prev/next the index is already set;
      // if arriving fresh (e.g. from shared-item tile or main DB), push to history
      const arrivedViaPrevNext = navHistory[navIndex] === formId;
      if (!arrivedViaPrevNext) {
        // Truncate forward history and push new entry
        navHistory = navHistory.slice(0, navIndex + 1);
        navHistory.push(formId);
        navIndex = navHistory.length - 1;
        sessionStorage.setItem(NAV_KEY, JSON.stringify(navHistory));
        sessionStorage.setItem(NAV_KEY + '_idx', navIndex);
      }
      updateNavButtons(formId);

      fetch('final_workshop_db.json')
        .then(r => r.json())
        .then(data => {
          const item = data.find(i => i.CNAM_FormID === formId);
          if (!item) { contentDiv.innerHTML = `<div class="error-message">Item "${formId}" not found.</div>`; return; }
          renderDetailPage(item, data);
        })
        .catch(err => { console.error(err); contentDiv.innerHTML = '<div class="error-message">Error loading database.</div>'; });
    }

    function fadeImg(img) {
      img.classList.add('lazy-fade');
      if (img.complete && img.naturalWidth > 0) {
        img.classList.add('loaded');
      } else {
        img.addEventListener('load', () => img.classList.add('loaded'), { once: true });
        img.addEventListener('error', () => img.classList.add('loaded'), { once: true });
      }
      return img;
    }

    function openLightbox(src) {
      const overlay = document.createElement('div');
      overlay.className = 'lightbox-overlay';

      const inner = document.createElement('div');
      inner.className = 'lightbox-inner';
      inner.addEventListener('click', e => e.stopPropagation());

      const img = document.createElement('img');
      img.src = src;
      img.alt = '';

      const closeBtn = document.createElement('button');
      closeBtn.className = 'lightbox-close';
      closeBtn.textContent = '✕';
      closeBtn.addEventListener('click', () => document.body.removeChild(overlay));

      inner.appendChild(img);
      inner.appendChild(closeBtn);
      overlay.appendChild(inner);

      // Click outside inner closes
      overlay.addEventListener('click', () => document.body.removeChild(overlay));

      // Escape key closes
      const onKey = e => { if (e.key === 'Escape') { document.body.removeChild(overlay); document.removeEventListener('keydown', onKey); } };
      document.addEventListener('keydown', onKey);

      document.body.appendChild(overlay);
    }

    function updateOGMetaTags(item) {
      const baseUrl = window.location.origin + '/mrsblobby.github.io/76-CAMPDatabase/Experimental/';
      
      // Update title
      document.title = `${item.Name} - C.A.M.P. Database`;
      const titleTag = document.querySelector('meta[property="og:title"]');
      const ogTitle = `${item.Name} - Detailed View`;
      if (titleTag) titleTag.setAttribute('content', ogTitle);
      else {
        const newTag = document.createElement('meta');
        newTag.setAttribute('property', 'og:title');
        newTag.setAttribute('content', ogTitle);
        document.head.appendChild(newTag);
      }

      // Update description
      const description = `${item.Category}${item.SubCategory ? ' > ' + item.SubCategory : ''} | Budget: ${item.BudgetCost || 'N/A'} | Fallout 76 C.A.M.P. Item Database`;
      const descTag = document.querySelector('meta[property="og:description"]');
      if (descTag) descTag.setAttribute('content', description);
      else {
        const newTag = document.createElement('meta');
        newTag.setAttribute('property', 'og:description');
        newTag.setAttribute('content', description);
        document.head.appendChild(newTag);
      }

      // Update image — prefer storefront, fall back to item icon
      let imageUrl = null;
      if (item.ENTM_ImagePath && item.ENTM_ImageNames && item.ENTM_ImageNames.trim()) {
        const basePath = item.ENTM_ImagePath.trim().replace(/\\/g, '/');
        const firstImageName = item.ENTM_ImageNames.split(';')[0].trim().replace(/\.dds$/i, '');
        const relativePath = basePath.replace(/^Textures\//i, '');
        const imagePath = `storefront/${relativePath}${firstImageName}.png`;
        imageUrl = `https://raw.githubusercontent.com/MrsBlobby/mrsblobby.github.io/refs/heads/main/76-CAMPDatabase/Experimental/${imagePath}`;
      } else {
        const iconFile = (item.ARTO_FormID || item.CNAM_FormID || '').toLowerCase();
        if (iconFile) imageUrl = `https://raw.githubusercontent.com/MrsBlobby/mrsblobby.github.io/refs/heads/main/76-CAMPDatabase/Experimental/Images/${iconFile}.webp`;
      }
      
      const imageTag = document.querySelector('meta[property="og:image"]');
      if (imageUrl) {
        if (imageTag) imageTag.setAttribute('content', imageUrl);
        else {
          const newTag = document.createElement('meta');
          newTag.setAttribute('property', 'og:image');
          newTag.setAttribute('content', imageUrl);
          document.head.appendChild(newTag);
        }
      }

      // Ensure og:type and og:url exist
      if (!document.querySelector('meta[property="og:type"]')) {
        const typeTag = document.createElement('meta');
        typeTag.setAttribute('property', 'og:type');
        typeTag.setAttribute('content', 'website');
        document.head.appendChild(typeTag);
      }
      if (!document.querySelector('meta[property="og:url"]')) {
        const urlTag = document.createElement('meta');
        urlTag.setAttribute('property', 'og:url');
        urlTag.setAttribute('content', window.location.href);
        document.head.appendChild(urlTag);
      } else {
        document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
      }
    }

    function renderDetailPage(item, db) {

      // Budget hero row (full-width, sits between image and the label rows)

      // ── Unified right panel + storefront appended to wrapper below ──

      // ── Unified right panel ──
      const hasDesc = !!(item.ENTM_Description && item.ENTM_Description.trim());
      const hasCategory = (item.Category&&item.Category.trim()) || (item.SubCategory&&item.SubCategory.trim());
      const hasBook = !!(item.BOOK_FULL&&String(item.BOOK_FULL).trim());

          const normStr=txt=>String(txt||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
          function findRemove(pred){const idx=entmEdids.findIndex(pred);return idx>=0?entmEdids.splice(idx,1)[0]:'';}
          const reservedEdidMap={};
          entmFulls.forEach(full=>{const key=full.trim().toUpperCase();if(ExactPairs[key]){const exp=ExactPairs[key];const m=findRemove(e=>e.toUpperCase()===exp.toUpperCase())||findRemove(e=>e.toUpperCase().includes(exp.toUpperCase()))||findRemove(e=>exp.toUpperCase().includes(e.toUpperCase()));if(m)reservedEdidMap[full]=m;}});
          function pickBestEdid(fullName){if(!entmEdids.length)return'';const fn=normStr(fullName);let idx=entmEdids.findIndex(e=>normStr(e)===fn);if(idx>=0)return entmEdids.splice(idx,1)[0];idx=entmEdids.findIndex(e=>fullName.includes(e)||e.includes(fullName));if(idx>=0)return entmEdids.splice(idx,1)[0];const ft=fullName.toUpperCase().split(/[^A-Z0-9]+/).filter(Boolean);let bi=-1,bs=0;entmEdids.forEach((e,i)=>{const et=e.toUpperCase().split(/[^A-Z0-9]+/).filter(Boolean);const s=ft.reduce((s,t)=>s+(et.includes(t)?1:0),0);if(s>bs){bs=s;bi=i;}});if(bi>=0&&bs>0)return entmEdids.splice(bi,1)[0];return entmEdids.length?entmEdids.splice(0,1)[0]:'';}

          const entmPills=[];
          entmFulls.forEach(fullName=>{
            const matchedEdid=reservedEdidMap[fullName]||pickBestEdid(fullName);
            const edidUpper=String(matchedEdid||'').toUpperCase();
            const fullUpper=fullName.trim().toUpperCase();
            let iconSrc='';
            if(ExactPairs[fullUpper]&&edidUpper.startsWith('F1_ENTM'))iconSrc='../assets/SubCategory-AdditionalStorageIcon.svg';
            if(!iconSrc){for(const k in ManualEntmIcons){if(edidUpper.startsWith(k.toUpperCase())){iconSrc=ManualEntmIcons[k];break;}}}
            if(!iconSrc&&edidUpper.startsWith('F1_ENTM'))iconSrc='../assets/SubCategory-AdditionalStorageIcon.svg';
            if(!iconSrc){if(edidUpper.includes('ATX'))iconSrc='../assets/AtomIcon.webp';else if(/SCORE[_-]?MINISEASON/i.test(matchedEdid))iconSrc='../assets/SeasonIcon.webp';else if(/SCORE[_-]?S?\d+/i.test(matchedEdid)||edidUpper.includes('SCORE'))iconSrc='../assets/SeasonIcon.webp';}
            let tooltipText=fullName;
            for(const k in IconAltText_ENTM){if(edidUpper.startsWith(k.toUpperCase())){tooltipText=IconAltText_ENTM[k];break;}}
            if(tooltipText===fullName){for(const k in IconAltText_ENTM){if(edidUpper.includes(k.toUpperCase())){tooltipText=IconAltText_ENTM[k];break;}}}
            let textSuffix='';
            if(matchedEdid){const ak=Object.keys(miniSeasonAliases).find(k=>matchedEdid.startsWith(k));if(ak)textSuffix=` (Mini Season: ${miniSeasonAliases[ak]})`;else{const mm=matchedEdid.match(/MiniSeason_(?:\d+_)?([A-Za-z0-9]+)/i);if(mm)textSuffix=` (Mini Season: ${mm[1].replace(/([a-z])([A-Z])/g,'$1 $2')})`;else{const sm=matchedEdid.match(/SCORE[_]?S?(\d+)/i);if(sm)textSuffix=` (Season ${sm[1]})`;}}};
            entmPills.push(makePill(fullName+textSuffix, iconSrc ? [iconSrc] : [], tooltipText ? [tooltipText] : []));
          });
          entmPills.forEach((pill,i)=>{wrap.appendChild(pill);if(i<entmPills.length-1)wrap.appendChild(makeConnector(entmEntmConnector));});
        }

        block.appendChild(wrap);
        panel.appendChild(block);
      }

      wrapper.appendChild(panel);

      // ── Bottom full-width row: Max Build Count + Storefront Images ──
      const hasStorefront  = !!(item.ENTM_ImagePath && item.ENTM_ImageNames && item.ENTM_ImageNames.trim());

      if (true) { // always show bottom row
        const bottomRow = document.createElement('div');
        bottomRow.className = 'storefront-row';

        if (true) { // always show max build count section
          const h2 = document.createElement('h2');
          h2.textContent = 'Max Build Count';
          bottomRow.appendChild(h2);

          const statsRow = document.createElement('div');
          statsRow.className = 'max-build-row';

          // ── CAMP first ──
          const campStat = document.createElement('div');
          campStat.className = 'max-build-stat';
          const campIcon = document.createElement('img');
          campIcon.src = '../assets/CAMPIcon.svg'; campIcon.alt = 'C.A.M.P.';
          const campWrap = document.createElement('div');
          campWrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;';
          const campLbl = document.createElement('div'); campLbl.className = 'max-build-stat-label'; campLbl.textContent = 'C.A.M.P.';
          const campVal = document.createElement('div'); campVal.className = 'max-build-stat-value';
          campVal.textContent = hasCAMPMax ? item.CAMP_Max : 'None';
          if (!hasCAMPMax) campVal.style.color = '#666';
          campWrap.appendChild(campLbl); campWrap.appendChild(campVal);
          campStat.appendChild(campIcon); campStat.appendChild(campWrap);
          statsRow.appendChild(campStat);

          // ── Workshop second ──
          const wsStat = document.createElement('div');
          wsStat.className = 'max-build-stat';
          const wsIcon = document.createElement('img');
          wsIcon.src = '../assets/WorkshopIcon.webp'; wsIcon.alt = 'Workshop';
          const wsWrap = document.createElement('div');
          wsWrap.style.cssText = 'display:flex;flex-direction:column;gap:2px;';
          const wsLbl = document.createElement('div'); wsLbl.className = 'max-build-stat-label'; wsLbl.textContent = 'Workshop';
          const wsVal = document.createElement('div'); wsVal.className = 'max-build-stat-value';
          wsVal.textContent = hasWorkshopMax ? item.Workshop_Max : 'None';
          if (!hasWorkshopMax) wsVal.style.color = '#666';
          wsWrap.appendChild(wsLbl); wsWrap.appendChild(wsVal);
          wsStat.appendChild(wsIcon); wsStat.appendChild(wsWrap);
          statsRow.appendChild(wsStat);

          bottomRow.appendChild(statsRow);

          // ── Shares max build count with ──
          const globKey = item.Workshop_MaxFormID || item.CAMP_Max_FormID;
          const sharedLabel = document.createElement('div');
          sharedLabel.className = 'shared-label';
          sharedLabel.textContent = 'Shares Max Build Count With';
          bottomRow.appendChild(sharedLabel);

          if (globKey) {
            const shared = db.filter(d =>
              d.CNAM_FormID !== item.CNAM_FormID &&
              d.Name && d.Name !== 'null' &&
              (d.Workshop_MaxFormID === globKey || d.CAMP_Max_FormID === globKey)
            );
            const seen = new Set();
            const uniqueShared = shared.filter(d => {
              if (seen.has(d.CNAM_FormID)) return false;
              seen.add(d.CNAM_FormID); return true;
            }).sort((a, b) => (a.Name || '').localeCompare(b.Name || ''));

            if (uniqueShared.length > 0) {
              const MAX_VISIBLE = 14;
              const visibleItems = uniqueShared.slice(0, MAX_VISIBLE);
              const overflow = uniqueShared.slice(MAX_VISIBLE);

              const grid = document.createElement('div');
              grid.className = 'shared-grid';

              function makeSharedTile(d) {
                const a = document.createElement('a');
                a.className = 'shared-item';
                a.href = `item-view.html?id=${encodeURIComponent(d.CNAM_FormID)}`;
                const img = document.createElement('img');
                img.src = d.ARTO_FormID ? `Images/${d.ARTO_FormID.toLowerCase()}.webp` : `Images/${(d.CNAM_FormID||'').toLowerCase()}.webp`;
                img.alt = d.Name;
                img.onerror = function() { this.onerror=null; this.src=`Images/${(d.CNAM_FormID||'').toLowerCase()}.webp`; };
                fadeImg(img);
                const name = document.createElement('div');
                name.className = 'shared-item-name';
                name.textContent = d.Name;
                a.appendChild(img); a.appendChild(name);
                return a;
              }

              visibleItems.forEach(d => grid.appendChild(makeSharedTile(d)));

              if (overflow.length > 0) {
                const more = document.createElement('div');
                more.className = 'shared-view-more';
                more.textContent = `+${overflow.length} more`;
                more.addEventListener('click', () => {
                  const overlay = document.createElement('div');
                  overlay.className = 'shared-modal-overlay';
                  const wrap = document.createElement('div');
                  wrap.className = 'shared-modal-wrap';
                  wrap.addEventListener('click', e => e.stopPropagation());
                  const modal = document.createElement('div');
                  modal.className = 'shared-modal';

                  const closeBtn = document.createElement('button');
                  closeBtn.className = 'shared-modal-close';
                  closeBtn.textContent = '✕';
                  closeBtn.addEventListener('click', () => document.body.removeChild(overlay));

                  const h3 = document.createElement('h3');
                  h3.textContent = 'Shared Max Build Count';

                  // Search bar
                  const searchWrap = document.createElement('div');
                  searchWrap.style.cssText = 'margin-bottom:12px;';
                  const searchInput = document.createElement('input');
                  searchInput.type = 'text';
                  searchInput.placeholder = 'Search...';
                  searchInput.style.cssText = 'width:100%;box-sizing:border-box;padding:6px 10px;background:#111;border:1px solid #444;border-radius:4px;color:var(--text);font-size:13px;outline:none;';
                  searchInput.addEventListener('focus', () => searchInput.style.borderColor = 'var(--accent)');
                  searchInput.addEventListener('blur',  () => searchInput.style.borderColor = '#444');
                  searchWrap.appendChild(searchInput);

                  const allGrid = document.createElement('div');
                  allGrid.className = 'shared-grid';
                  uniqueShared.forEach(d => allGrid.appendChild(makeSharedTile(d)));

                  searchInput.addEventListener('input', () => {
                    const q = searchInput.value.toLowerCase();
                    allGrid.querySelectorAll('.shared-item').forEach(tile => {
                      const name = tile.querySelector('.shared-item-name')?.textContent.toLowerCase() || '';
                      tile.style.display = name.includes(q) ? '' : 'none';
                    });
                  });

                  modal.appendChild(h3);
                  modal.appendChild(searchWrap);
                  modal.appendChild(allGrid);
                  wrap.appendChild(closeBtn);
                  wrap.appendChild(modal);
                  overlay.appendChild(wrap);
                  overlay.addEventListener('click', () => document.body.removeChild(overlay));
                  const onKey = e => { if (e.key === 'Escape') { document.body.removeChild(overlay); document.removeEventListener('keydown', onKey); } };
                  document.addEventListener('keydown', onKey);
                  document.body.appendChild(overlay);
                  searchInput.focus();
                });
                grid.appendChild(more);
              }

              bottomRow.appendChild(grid);
            } else {
              // No shared items found
              const none = document.createElement('div');
              none.className = 'shared-none';
              none.textContent = 'None';
              bottomRow.appendChild(none);
            }
          } else {
            // No glob key — no sharing data
            const none = document.createElement('div');
            none.className = 'shared-none';
            none.textContent = 'None';
            bottomRow.appendChild(none);
          }
        }

        // ── Shared Build Menu Slot ──
        if (item.COBJ_FormID) {
          const sep = document.createElement('hr');
          sep.style.cssText = 'border:none;border-top:1px solid #383838;margin:16px 0;';
          bottomRow.appendChild(sep);

          const h2 = document.createElement('h2');
          h2.textContent = 'Build Menu Slot';
          bottomRow.appendChild(h2);

          const slotLabel = document.createElement('div');
          slotLabel.className = 'shared-label';
          slotLabel.textContent = 'Shares a Build Menu Slot With';
          bottomRow.appendChild(slotLabel);

          const slotShared = db.filter(d =>
            d.CNAM_FormID !== item.CNAM_FormID &&
            d.Name && d.Name !== 'null' &&
            d.COBJ_FormID === item.COBJ_FormID
          );
          const slotSeen = new Set();
          const uniqueSlot = slotShared.filter(d => {
            if (slotSeen.has(d.CNAM_FormID)) return false;
            slotSeen.add(d.CNAM_FormID); return true;
          }).sort((a, b) => (a.Name || '').localeCompare(b.Name || ''));

          if (uniqueSlot.length > 0) {
            const MAX_VISIBLE = 14;
            const visibleSlot = uniqueSlot.slice(0, MAX_VISIBLE);
            const overflowSlot = uniqueSlot.slice(MAX_VISIBLE);

            const grid = document.createElement('div');
            grid.className = 'shared-grid';

            function makeSlotTile(d) {
              const a = document.createElement('a');
              a.className = 'shared-item';
              a.href = `item-view.html?id=${encodeURIComponent(d.CNAM_FormID)}`;
              const img = document.createElement('img');
              img.src = d.ARTO_FormID ? `Images/${d.ARTO_FormID.toLowerCase()}.webp` : `Images/${(d.CNAM_FormID||'').toLowerCase()}.webp`;
              img.alt = d.Name;
              img.onerror = function() { this.onerror=null; this.src=`Images/${(d.CNAM_FormID||'').toLowerCase()}.webp`; };
              fadeImg(img);
              const name = document.createElement('div');
              name.className = 'shared-item-name';
              name.textContent = d.Name;
              a.appendChild(img); a.appendChild(name);
              return a;
            }

            visibleSlot.forEach(d => grid.appendChild(makeSlotTile(d)));

            if (overflowSlot.length > 0) {
              const more = document.createElement('div');
              more.className = 'shared-view-more';
              more.textContent = `+${overflowSlot.length} more`;
              more.addEventListener('click', () => {
                const overlay = document.createElement('div');
                overlay.className = 'shared-modal-overlay';
                const wrap = document.createElement('div');
                wrap.className = 'shared-modal-wrap';
                wrap.addEventListener('click', e => e.stopPropagation());
                const modal = document.createElement('div');
                modal.className = 'shared-modal';

                const closeBtn = document.createElement('button');
                closeBtn.className = 'shared-modal-close';
                closeBtn.textContent = '✕';
                closeBtn.addEventListener('click', () => document.body.removeChild(overlay));

                const h3 = document.createElement('h3');
                h3.textContent = 'Build Menu Slot';

                const searchWrap = document.createElement('div');
                searchWrap.style.cssText = 'margin-bottom:12px;';
                const searchInput = document.createElement('input');
                searchInput.type = 'text';
                searchInput.placeholder = 'Search...';
                searchInput.style.cssText = 'width:100%;box-sizing:border-box;padding:6px 10px;background:#111;border:1px solid #444;border-radius:4px;color:var(--text);font-size:13px;outline:none;';
                searchInput.addEventListener('focus', () => searchInput.style.borderColor = 'var(--accent)');
                searchInput.addEventListener('blur',  () => searchInput.style.borderColor = '#444');
                searchWrap.appendChild(searchInput);

                const allGrid = document.createElement('div');
                allGrid.className = 'shared-grid';
                uniqueSlot.forEach(d => allGrid.appendChild(makeSlotTile(d)));

                searchInput.addEventListener('input', () => {
                  const q = searchInput.value.toLowerCase();
                  allGrid.querySelectorAll('.shared-item').forEach(tile => {
                    const n = tile.querySelector('.shared-item-name')?.textContent.toLowerCase() || '';
                    tile.style.display = n.includes(q) ? '' : 'none';
                  });
                });

                modal.appendChild(h3);
                modal.appendChild(searchWrap);
                modal.appendChild(allGrid);
                wrap.appendChild(closeBtn);
                wrap.appendChild(modal);
                overlay.appendChild(wrap);
                overlay.addEventListener('click', () => document.body.removeChild(overlay));
                const onKey = e => { if (e.key === 'Escape') { document.body.removeChild(overlay); document.removeEventListener('keydown', onKey); } };
                document.addEventListener('keydown', onKey);
                document.body.appendChild(overlay);
                searchInput.focus();
              });
              grid.appendChild(more);
            }

            bottomRow.appendChild(grid);
          } else {
            const none = document.createElement('div');
            none.className = 'shared-none';
            none.textContent = 'None';
            bottomRow.appendChild(none);
          }
        }

        // ── Storefront Images ──
        if (hasStorefront) {
          const sep = document.createElement('hr');
          sep.style.cssText = 'border:none;border-top:1px solid #383838;margin:16px 0;';
          bottomRow.appendChild(sep);

          const h2 = document.createElement('h2');
          h2.textContent = 'Storefront Images';
          bottomRow.appendChild(h2);

          const basePath = item.ENTM_ImagePath.trim().replace(/\\/g, '/');
          const imageNames = item.ENTM_ImageNames.split(';').map(s => s.trim()).filter(Boolean);
          const grid = document.createElement('div');
          grid.className = 'storefront-grid';

          imageNames.forEach(name => {
            const baseName = name.replace(/\.dds$/i, '');
            const relativePath = basePath.replace(/^Textures\//i, '');
            const lowerRelative = relativePath.toLowerCase();
            const lowerBase = baseName.toLowerCase();
            const src = `../storefront/${lowerRelative}${lowerBase}.png`;
            const srcFallback = `../storefront/${lowerRelative}${lowerBase}_l.png`;

            const thumb = document.createElement('div');
            thumb.className = 'storefront-thumb';
            thumb.title = baseName;

            const img = document.createElement('img');
            img.src = src;
            img.alt = baseName;
            img.loading = 'lazy';
            img.onerror = function() {
              if (!this.src.endsWith(srcFallback)) { this.onerror = null; this.src = srcFallback; }
            };
            fadeImg(img);

            thumb.appendChild(img);
            thumb.addEventListener('click', () => openLightbox(img.src));
            grid.appendChild(thumb);
          });

          bottomRow.appendChild(grid);
        }

        wrapper.appendChild(bottomRow);
      }

      contentDiv.appendChild(wrapper);
      document.title = item.Name;
    }
  </script>
</body>
