<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detailed view for Fallout 76 C.A.M.P. Item">
  <link rel="icon" href="./favicon.ico" sizes="any">
  <link rel="shortcut icon" type="image/png" href="../assets/CAMPIcon2-32x32.png">
  <title>C.A.M.P. Item Details</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .detail-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .detail-header {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding: 16px;
      background-color: var(--card-bg);
      border-radius: 6px;
      border: 2px solid var(--accent);
    }

    .detail-image {
      flex-shrink: 0;
    }

    .detail-image img {
      max-width: 200px;
      height: auto;
      border-radius: 6px;
    }

    .detail-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-info h1 {
      margin: 0;
      color: var(--accent);
      font-size: 28px;
    }

    .detail-section {
      margin-bottom: 16px;
      padding: 16px;
      background-color: var(--card-bg);
      border-radius: 6px;
      border: 2px solid var(--accent);
    }

    .detail-section h2 {
      margin-top: 0;
      color: var(--accent);
      font-size: 18px;
    }

    .back-button {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 16px;
      background-color: var(--accent);
      color: black;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background-color 0.2s ease;
    }

    .back-button:hover {
      background-color: var(--accent-dim);
    }

    .error-message {
      padding: 16px;
      background-color: #8b2c2c;
      color: #ff6b6b;
      border-radius: 6px;
      border: 2px solid #ff6b6b;
      margin: 16px 0;
    }

    @media (max-width: 600px) {
      .detail-header {
        flex-direction: column;
        align-items: center;
      }

      .detail-image img {
        max-width: 150px;
      }

      .detail-info h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="detail-container">
    <a href="index.html" class="back-button">← Back to Database</a>
    <div id="content"></div>
  </div>

  <script>
    // Get the FormID from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const formId = urlParams.get('id');

    const contentDiv = document.getElementById('content');

    if (!formId) {
      contentDiv.innerHTML = '<div class="error-message">Error: No item ID provided. Please use the "View Detailed View" button from the database.</div>';
    } else {
      // Fetch the database
      fetch('final_workshop_db.json')
        .then(response => response.json())
        .then(data => {
          // Find the item by CNAM_FormID
          const item = data.find(i => i.CNAM_FormID === formId);

          if (!item) {
            contentDiv.innerHTML = `<div class="error-message">Error: Item with ID "${formId}" not found in database.</div>`;
            return;
          }

          // Render the detail page
          renderDetailPage(item);
        })
        .catch(err => {
          console.error("Failed to load database:", err);
          contentDiv.innerHTML = '<div class="error-message">Error loading database. Please try again later.</div>';
        });
    }

    function renderDetailPage(item) {
      let imgSrc = `Images/${(item.ARTO_FormID || '').toLowerCase()}.webp`;

      // Fallback to CNAM if ARTO image fails to load
      if (!item.ARTO_FormID) {
        imgSrc = `Images/${(item.CNAM_FormID || '').toLowerCase()}.webp`;
      }

      let html = `
        <div class="detail-header">
          <div class="detail-image">
            <img src="${imgSrc}" alt="${item.Name}" onerror="this.src='Images/${(item.CNAM_FormID || '').toLowerCase()}.webp'">
          </div>
          <div class="detail-info">
            <h1>${item.Name}</h1>
            <p><strong>Form ID:</strong> ${item.CNAM_FormID}</p>
            ${item.CNAM_EditorID ? `<p><strong>Editor ID:</strong> ${item.CNAM_EditorID}</p>` : ''}
          </div>
        </div>
      `;

      // Add more sections as needed - placeholder for future content
      contentDiv.innerHTML = html;
    }
  </script>
</body>
</html>
